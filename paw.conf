# paw configuration — safe to commit (contains NO secrets).
# The GPG *private* key lives only in the CI secret GPG_PRIVATE_KEY.

# GitHub repo (user/name) whose Releases host the built package files.
PAW_GH_REPO="skint007/paw"

# Release tag that holds the rolling repo (db + packages + public key).
PAW_RELEASE_TAG="repo"

# pacman repo name (as it appears in pacman.conf) and the paw command's repo.
PAW_REPO_NAME="paw"

# Long GPG key id used to sign packages and the repo database.
# Find it with: gpg --list-secret-keys --keyid-format=long
PAW_GPG_KEYID="BAA249F70CDB0F045B83F6CF640578DB1360A8A5"
