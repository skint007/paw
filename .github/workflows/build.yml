name: build-repo

on:
  push:
    branches: [main]
    paths:
      - packages.json
      - paw
      - paw.conf
      - packaging/**
      - scripts/**
      - .github/workflows/build.yml
  schedule:
    - cron: '0 8 * * *'   # daily 08:00 UTC — rebuild any package whose source repo changed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: System update & tools
        run: pacman -Syu --noconfirm --needed git jq github-cli

      - uses: actions/checkout@v5

      - name: Create build user
        run: |
          useradd -m builder
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Restore previous repo
        shell: bash
        run: |
          # shellcheck disable=SC1091
          source ./paw.conf
          mkdir -p out
          # Pull the currently published repo so unchanged packages can be carried
          # forward instead of rebuilt. Missing on the very first run — that's fine.
          gh release download "$PAW_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --dir out --clobber \
            || echo "No previous release to restore (first run)."
          chown -R builder:builder out
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Import signing key
        shell: bash
        run: |
          install -d -m 700 -o builder -g builder /home/builder/.gnupg
          # Allow non-interactive (headless) signing — no pinentry/tty available.
          sudo -u builder -H bash -c '
            printf "allow-loopback-pinentry\ndefault-cache-ttl 7200\nmax-cache-ttl 7200\n" > ~/.gnupg/gpg-agent.conf
            printf "pinentry-mode loopback\n" > ~/.gnupg/gpg.conf
          '
          printf '%s' "$GPG_PRIVATE_KEY" | sudo -u builder -H gpg --batch --import
          sudo -u builder -H gpg-connect-agent reloadagent /bye
          # If the key has a passphrase, set a GPG_PASSPHRASE secret; this caches
          # it in the agent so makepkg can sign unattended. Harmless if unset.
          if [ -n "${GPG_PASSPHRASE:-}" ]; then
            source ./paw.conf
            echo cache | sudo -u builder -H gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" --local-user "$PAW_GPG_KEYID" \
              --output /dev/null --detach-sign - || true
          fi
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build & sign repo
        run: sudo -u builder -H bash scripts/build-repo.sh

      - name: Publish to GitHub Release
        shell: bash
        run: |
          # shellcheck disable=SC1091
          source ./paw.conf
          TAG="$PAW_RELEASE_TAG"; REPO="$GITHUB_REPOSITORY"
          gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$REPO" --title "paw repo" --notes "Rolling package repository"

          if [[ ! -s out/.upload ]]; then
            echo "Nothing changed — no assets to publish."
            exit 0
          fi

          # Desired repo contents = non-hidden files in out/.
          mapfile -t desired < <(cd out && ls -1 | grep -v '^\.')

          # Delete release assets no longer part of the repo (old versions of
          # rebuilt packages, or packages removed from the manifest).
          for asset in $(gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name'); do
            if ! printf '%s\n' "${desired[@]}" | grep -qxF "$asset"; then
              echo "  - deleting stale asset: $asset"
              gh release delete-asset "$TAG" "$asset" --repo "$REPO" -y || true
            fi
          done

          # Upload only the files that changed this run.
          files=()
          while IFS= read -r f; do [[ -n "$f" ]] && files+=("out/$f"); done < out/.upload
          echo ":: Uploading ${#files[@]} changed file(s)"
          gh release upload "$TAG" "${files[@]}" --repo "$REPO" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
